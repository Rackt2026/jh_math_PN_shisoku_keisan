<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="数学マスター">
    
    <title>数学マスター極：正負の四則試練</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #eef2f3; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }

        .container { 
            background: white; 
            padding: 15px; 
            border-radius: 20px; 
            width: 95%; 
            max-width: 450px; 
            margin: 10px auto; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            box-sizing: border-box; 
            position: relative;
        }

        /* スタート画面のスタイル */
        .logo-wrapper { text-align: center; margin-bottom: 15px; }
        .logo-img { max-width: 180px; height: auto; display: inline-block; vertical-align: middle; }
        .menu-title { text-align: center; color: #2196f3; font-size: 1.6rem; margin-bottom: 20px; font-weight: bold; line-height: 1.4; }
        .menu-list { display: flex; flex-direction: column; gap: 12px; }
        .menu-btn { background-color: #fff; border: 2px solid #2196f3; color: #2196f3; padding: 12px 15px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1976d2; text-align: left; transition: all 0.1s; -webkit-tap-highlight-color: transparent; }
        .menu-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1976d2; }
        
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; z-index: 10; }
        .back-btn { background-color: #9e9e9e; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; border: none; cursor: pointer; font-weight: bold; }
        .reset-btn { background-color: #f44336; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; border: none; cursor: pointer; font-weight: bold; }

        .info { display: flex; justify-content: space-around; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 5px; }
        
        .problem-box { 
            background: #f8f9fa; 
            border-radius: 12px; 
            padding: 20px 10px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid #e0e0e0; 
            margin-bottom: 15px; 
            position: relative; 
            min-height: 120px; 
        }
        .problem { font-size: 1.8rem; font-weight: bold; color: #2c3e50; text-align: center; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 5px; line-height: 1.5; }
        
        /* 分数表示用のCSS */
        .frac-container { display: inline-flex; align-items: center; vertical-align: middle; }
        .whole-num { font-size: 1.8rem; font-weight: bold; margin-right: 2px; }
        .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; padding: 0 4px; font-size: 1.5rem; line-height: 1; }
        .frac .num { border-bottom: 2px solid #2c3e50; padding-bottom: 2px; width: 100%; text-align: center; }
        .frac .den { padding-top: 2px; width: 100%; text-align: center; }

        #feedback-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: none; opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(255,255,255,0.8); }
        #feedback-overlay.show { opacity: 1; transform: scale(1); }
        #feedback-text { font-size: 2.2rem; font-weight: 900; text-align: center; line-height: 1.2; -webkit-text-stroke: 2px white; paint-order: stroke; }

        /* アクションエリア */
        .action-area { display: flex; flex-direction: column; gap: 10px; }
        .action-btn { background-color: #2196f3; color: white; border: none; border-radius: 12px; font-size: 1.4rem; padding: 15px 0; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1976d2; text-align: center; -webkit-tap-highlight-color: transparent; }
        .action-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1976d2; }
        
        .ans-display { font-size: 2rem; background: #fff; border: 2px solid #cbd5e0; border-radius: 12px; min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #e91e63; padding: 10px; box-sizing: border-box; }

        /* 解説画面用 */
        #explanation-content .frac { font-size: 1.2rem; }
        #explanation-content p { margin: 6px 0; font-size: 0.95rem; color: #333; }
        #explanation-content h4 { margin: 12px 0 4px 0; font-size: 1.05rem; }
        .step-box { background: #f8f9fa; border-left: 4px solid #2196f3; padding: 8px 12px; margin: 8px 0; border-radius: 0 8px 8px 0; font-weight: bold; font-size: 1.05rem; color: #2c3e50; }

        /* 筆算用テーブルスタイル */
        .hissan-table { border-collapse: collapse; margin: 5px 0 5px 10px; font-family: monospace; font-size: 1.3rem; }
        .hissan-table td { padding: 2px 4px; text-align: center; width: 20px; }
        .hissan-table .border-top { border-top: 2px solid #2c3e50; }

        /* 斜め消し線と添え字（手書き約分風）スタイル */
        .yk-block { display: inline-flex; flex-direction: column; position: relative; line-height: 1.1; vertical-align: middle; text-align: center; min-width: 24px; }
        .yk-sub-top { font-size: 0.75rem; min-height: 12px; font-weight: bold; text-align: right; padding-right: 2px; }
        .yk-sub-bottom { font-size: 0.75rem; min-height: 12px; font-weight: bold; text-align: left; padding-left: 2px; }
        .yk-main { font-size: 1.2rem; position: relative; display: inline-block; padding: 0 2px; }
        
        /* 色分け用のスタイル定義 */
        .color-orange { color: #ff9800; }
        .color-blue { color: #2196f3; }
        
        .slashed-orange { background: linear-gradient(to top left, transparent 46%, #ff9800 49%, #ff9800 51%, transparent 54%); }
        .slashed-blue { background: linear-gradient(to top left, transparent 46%, #2196f3 49%, #2196f3 51%, transparent 54%); }
        .slashed-red { background: linear-gradient(to top left, transparent 46%, #ff4444 49%, #ff4444 51%, transparent 54%); }

        .result-screen { display: none; text-align: center; justify-content: center; align-items: center; flex-direction: column; min-height: 85vh; background: #764ba2; color: white; border-radius: 20px; padding: 20px; }
        
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 101; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <div class="logo-wrapper">
        <a href="https://manabiya-tsubame.com/" target="_blank">
            <img src="rogo.png" alt="ロゴ" class="logo-img">
        </a>
    </div>
    <div class="menu-title">数学マスター極<br><span style="font-size: 1.1rem; color:#555;">〜 正負の数：四則計算の試練 〜</span></div>
    <div class="menu-list">
        <button class="menu-btn" onclick="startGame(1)">１、正負の数の四則計算（自然数）</button>
        <button class="menu-btn" onclick="startGame(2)">２、正負の数の四則計算（自然数、分数ミックス）</button>
        <button class="menu-btn" onclick="startGame(3)">３、正負の数の四則計算（自然数、小数ミックス）</button>
        <button class="menu-btn" onclick="startGame(4)">４、正負の数の四則計算（分数のみ）</button>
        <button class="menu-btn" onclick="startGame(5)">５、正負の数の四則計算（小数のみ）</button>
    </div>
</div>

<div class="container" id="game-screen" style="display: none;">
    <div id="feedback-overlay"><div id="feedback-text"></div></div>
    
    <div class="header-controls">
        <button class="back-btn" onclick="backToTitle()">← タイトル</button>
        <div style="font-size: 0.8rem; color: #333; font-weight: bold;" id="mode-title-display">モード</div>
        <button class="reset-btn" onclick="resetGame()">やり直す</button>
    </div>

    <div class="info">
        <div>残り: <span id="q-count">10</span></div>
        <div style="color:#4caf50">正解: <span id="correct-count">0</span></div>
        <div style="color:#f44336">ミス: <span id="miss-count">0</span></div>
    </div>

    <div class="problem-box" id="p-box">
        <div id="problem" class="problem">...</div>
    </div>

    <div class="action-area">
        <button id="show-ans-btn" class="action-btn" onclick="showAnswer()">正解は？</button>
        
        <div id="answer-wrapper" style="display: none; flex-direction: column; gap: 8px;">
            <div style="font-size:0.8rem; color:#666; font-weight:bold;">【正解】</div>
            <div id="answer-display" class="ans-display"></div>
            
            <button class="action-btn" style="background-color: #ff9800; box-shadow: 0 4px 0 #f57c00; font-size: 1.1rem; padding: 10px 0; margin-top: 5px;" onclick="showExplanation()">解き方の解説をみる</button>
            
            <button class="action-btn" style="background-color: #4caf50; box-shadow: 0 4px 0 #388e3c; margin-top: 15px;" onclick="submitAndProceed()">次へ進む ➔</button>
        </div>
    </div>
</div>

<div class="container" id="explanation-screen" style="display: none;">
    <div class="header-controls">
        <button class="back-btn" onclick="hideExplanation()">← 戻る</button>
        <div style="font-size: 0.8rem; color: #333; font-weight: bold;">解き方の解説</div>
        <div style="width: 40px;"></div>
    </div>
    
    <div id="explanation-content" style="padding: 10px 5px; overflow-y: auto; max-height: 65vh; line-height: 1.6;">
        </div>
    
    <button class="action-btn" style="background-color: #9e9e9e; box-shadow: 0 4px 0 #757575; font-size: 1.1rem; padding: 12px 0; margin-top: 10px;" onclick="hideExplanation()">解説を閉じて戻る</button>
</div>

<div class="container result-screen" id="result-screen">
    <h1>試練達成！</h1>
    <div style="font-size: 5rem; font-weight: 900; margin: 10px 0;"><span id="final-score">0</span>点</div>
    <p style="font-size: 1.2rem; margin-bottom: 25px;">正解：<span id="final-correct">0</span> / ミス：<span id="final-miss">0</span></p>
    <button class="action-btn" style="background-color: #fff; color: #764ba2; width: 80%; box-shadow: 0 4px 0 #5e35b1;" onclick="backToTitle()">タイトルに戻る</button>
</div>

<script>
    let currentMode = 1;
    let questionIndex = 0;
    let correctTotal = 0;
    let missTotal = 0;
    let totalQuestions = 10;
    
    let currentAnswerObj = { num: 0, den: 1 };
    let fracDigitPattern = []; 
    
    let currentT1, currentT2, currentOp;

    const modeNames = [
        "", "自然数の四則計算", "自然数・分数ミックス", "自然数・小数ミックス", "分数のみの四則計算", "小数のみの四則計算"
    ];
    
    const msgSupport = [
        "さぁ次の問題も頑張ろう！",
        "その調子！次もいってみよう！",
        "ナイス！次へ進おう！",
        "いいリズム！次の問題へレッツゴー！",
        "次もこの調子でクリアしよう！"
    ];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration, g) {
        try {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(g, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }
    function soundCorrect() { playTone(880, 'sine', 0.4, 0.1); setTimeout(() => playTone(1318, 'sine', 0.4, 0.08), 80); }
    function soundWrong() { playTone(220, 'triangle', 0.3, 0.15); }

    function createConfetti() {
        const pBox = document.getElementById('p-box');
        for (let i = 0; i < 25; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            c.style.left = Math.random() * 100 + '%';
            c.style.top = Math.random() * 100 + '%';
            pBox.appendChild(c);
            setTimeout(() => c.remove(), 600);
        }
    }

    function showFeedback(type, text) {
        const overlay = document.getElementById('feedback-overlay');
        const fText = document.getElementById('feedback-text');
        const pText = document.getElementById('problem');
        overlay.classList.remove('show');
        pText.classList.remove('shake');

        if (type === 'correct') {
            soundCorrect();
            fText.innerText = text;
            fText.style.color = '#4caf50';
            createConfetti();
        } else {
            soundWrong();
            fText.innerText = "どんまい！";
            fText.style.color = '#f44336';
            pText.classList.add('shake');
        }
        setTimeout(() => overlay.classList.add('show'), 10);
        setTimeout(() => { overlay.classList.remove('show'); }, 1000);
    }

    function gcd(a, b) { return b ? gcd(b, a % b) : Math.abs(a); }
    function lcm(a, b) { return (a * b) / gcd(a, b); }
    function simplify(f) {
        let g = gcd(f.num, f.den);
        let num = f.num / g;
        let den = f.den / g;
        if (den < 0) { num = -num; den = -den; }
        return { num, den };
    }
    const math = {
        add: (f1, f2) => simplify({ num: f1.num * f2.den + f2.num * f1.den, den: f1.den * f2.den }),
        sub: (f1, f2) => simplify({ num: f1.num * f2.den - f2.num * f1.den, den: f1.den * f2.den }),
        mul: (f1, f2) => simplify({ num: f1.num * f2.num, den: f1.den * f2.den }),
        div: (f1, f2) => simplify({ num: f1.num * f2.den, den: f1.den * f2.num })
    };

    function startGame(mode) {
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        currentMode = mode;
        document.getElementById('start-screen').style.display = "none";
        document.getElementById('game-screen').style.display = "flex";
        document.getElementById('mode-title-display').innerText = modeNames[mode];
        resetGame();
    }

    function backToTitle() {
        document.getElementById('game-screen').style.display = "none";
        document.getElementById('explanation-screen').style.display = "none";
        document.getElementById('result-screen').style.display = "none";
        document.getElementById('start-screen').style.display = "flex";
    }

    function resetGame() {
        questionIndex = 0;
        correctTotal = 0;
        missTotal = 0;
        fracDigitPattern = [1, 1, 1, 1, 1, 1, 1, 1, 2, 2].sort(() => Math.random() - 0.5);
        updateUI();
        nextProblem();
    }

    function updateUI() {
        document.getElementById('q-count').innerText = totalQuestions - questionIndex;
        document.getElementById('correct-count').innerText = correctTotal;
        document.getElementById('miss-count').innerText = missTotal;
    }

    function generateTerm(type, forcedDen = null) {
        let sign = Math.random() > 0.5 ? 1 : -1;
        let signStr = sign === 1 ? '+' : '-';
        let res = { type, sign, signStr };

        if (type === 'int') {
            let v = Math.floor(Math.random() * 19) + 2; 
            res.val = { num: sign * v, den: 1 };
            res.absStr = `${v}`;
            res.html = `(${signStr}${v})`;
            res.rawAbs = v;
        } 
        else if (type === 'frac') {
            let digits = fracDigitPattern[questionIndex] || 1;
            let d, n;
            
            if (forcedDen) {
                d = forcedDen;
                if (digits === 1) {
                    n = Math.floor(Math.random() * 9) + 1;
                } else {
                    n = Math.floor(Math.random() * 40) + 10;
                }
            } else {
                if (digits === 1) {
                    d = Math.floor(Math.random() * 8) + 2; 
                    n = Math.floor(Math.random() * 9) + 1; 
                } else {
                    const niceDens = [10, 12, 15, 16, 18, 20, 24, 25, 30, 36, 40, 45, 50, 60, 80, 90];
                    d = niceDens[Math.floor(Math.random() * niceDens.length)];
                    n = Math.floor(Math.random() * 40) + 10; 
                }
            }
            
            res.val = { num: sign * n, den: d };
            res.rawAbs = { num: n, den: d };
            
            let isMixed = Math.random() > 0.5 && n > d;
            if (isMixed) {
                let w = Math.floor(n / d);
                let r = n % d;
                if (r === 0) { r = 1; n = w * d + 1; res.val = { num: sign * n, den: d }; res.rawAbs = { num: n, den: d }; }
                res.absStr = `${w}と${r}/${d}`;
                res.html = `(${signStr}<span class="frac-container"><span class="whole-num">${w}</span><span class="frac"><span class="num">${r}</span><span class="den">${d}</span></span></span>)`;
            } else {
                res.absStr = `<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>`;
                res.html = `(${signStr}<span class="frac"><span class="num">${n}</span><span class="den">${d}</span></span>)`;
            }
        } 
        else if (type === 'dec') {
            let intPart = Math.floor(Math.random() * 10); 
            let decPart = Math.floor(Math.random() * 9) + 1; 
            let totalNum = intPart * 10 + decPart;
            res.val = { num: sign * totalNum, den: 10 };
            res.absStr = `${intPart}.${decPart}`;
            res.html = `(${signStr}${intPart}.${decPart})`;
            res.rawAbs = intPart + (decPart / 10);
        }
        return res;
    }

    function getModeTypes(mode) {
        switch(mode) {
            case 1: return ['int', 'int'];
            case 2: return [Math.random() > 0.5 ? 'int' : 'frac', Math.random() > 0.5 ? 'int' : 'frac'];
            case 3: return [Math.random() > 0.5 ? 'int' : 'dec', Math.random() > 0.5 ? 'int' : 'dec'];
            case 4: return ['frac', 'frac'];
            case 5: return ['dec', 'dec'];
        }
    }

    function nextProblem() {
        document.getElementById('show-ans-btn').style.display = "block";
        document.getElementById('answer-wrapper').style.display = "none";

        let types = getModeTypes(currentMode);
        let digits = fracDigitPattern[questionIndex] || 1;

        const ops = [
            { sign: '＋', action: math.add }, { sign: '－', action: math.sub },
            { sign: '×', action: math.mul }, { sign: '÷', action: math.div }
        ];

        let loopCount = 0;
        do {
            let den1 = null;
            let den2 = null;

            if (digits === 2
